        linear-gradient(rgba(4,4,4,0.44), rgba(4,4,4,0.44)),

      background-position: 0 0, center 50%;
      background-repeat: no-repeat;
    }

    #screenshots .section-header,
    #screenshots h2 {
      text-shadow: 0 1px 10px rgba(0,0,0,0.98), 0 0 30px rgba(0,0,0,0.7);
    }

<!-- ══════════════════════════════════════════════════════ SCREENSHOTS -->
<section id="screenshots" class="page-top">
  <div class="container">
    <p class="section-header">// Visual Chronicle</p>
    <h2>In <span class="accent">Action</span></h2>
    <hr class="divider">
    <div class="screenshot-grid" id="screenshot-grid"></div>
  </div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <button class="lb-prev" id="lb-prev">&#8249;</button>
  <button class="lb-next" id="lb-next">&#8250;</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-caption" class="lb-caption"></div>
  <div id="lb-counter" class="lb-counter"></div>
</div>

<script>
  const _page = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('nav a[href]').forEach(a => {
    if (a.getAttribute('href') === _page) a.classList.add('active');
  });

  // ── Parallax ──────────────────────────────────────────────────────────
  const screenshotsBg = document.getElementById('screenshots-bg');
  let screenshotsRaf = null;
  window.addEventListener('scroll', () => {
    if (screenshotsRaf) cancelAnimationFrame(screenshotsRaf);
    screenshotsRaf = requestAnimationFrame(() => {
      const shift = window.scrollY * 0.12;
      screenshotsBg.style.backgroundPosition = `0 0, center calc(50% - ${shift}px)`;
    });
  }, { passive: true });

  // ── Screenshots Gallery & Lightbox ──────────────────────────────────
  const screenshots = [
    { src: 'screenshots/intro.png',       caption: 'Intro Screen — QUESTLINE greets you each session' },
    { src: 'screenshots/dashboard.png',   caption: 'Dashboard — Daily quests, rituals, and live stats at a glance' },
    { src: 'screenshots/projects.png',    caption: 'Projects — Tasks, notes, journal, and milestones in one workspace' },
    { src: 'screenshots/character.png',   caption: 'Character — Level progress, XP history, and the Great Chronicle' },
    { src: 'screenshots/library.png',     caption: 'Lore Library — Class quests, world lore, and memory fragments' },
    { src: 'screenshots/soundscapes.png', caption: 'Soundscapes — Eight ambient audio environments for deep work' },
    { src: 'screenshots/sync.png',        caption: 'Sync & Stats — Identity, backups, and productivity statistics' },
  ];

  let lbIdx = 0;
  const grid  = document.getElementById('screenshot-grid');
  const lb    = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-caption');
  const lbCtr = document.getElementById('lb-counter');

  screenshots.forEach((s, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'screenshot-thumb';
    thumb.innerHTML = `<img src="${s.src}" alt="${s.caption}" loading="lazy"><div class="screenshot-label">${s.caption}</div>`;
    thumb.addEventListener('click', () => openLightbox(i));
    grid.appendChild(thumb);
  });

  function openLightbox(i) {
    lbIdx = i;
    lbImg.src = screenshots[i].src;
    lbImg.alt = screenshots[i].caption;
    lbCap.textContent = screenshots[i].caption;
    lbCtr.textContent = (i + 1) + ' / ' + screenshots.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    lbIdx = (lbIdx + dir + screenshots.length) % screenshots.length;
    lbImg.src = screenshots[lbIdx].src;
    lbImg.alt = screenshots[lbIdx].caption;
    lbCap.textContent = screenshots[lbIdx].caption;
    lbCtr.textContent = (lbIdx + 1) + ' / ' + screenshots.length;
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbNav(-1); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbNav(1); });
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')   lbNav(-1);
    if (e.key === 'ArrowRight')  lbNav(1);
  });
</script>
